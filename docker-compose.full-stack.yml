services:
  # SQL Server with test database
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flashdb-sql-server
    user: root
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "FlashDB@Password123"
      MSSQL_PID: "Developer"
    ports:
      - "${SQL_SERVER_HOST_PORT:-1434}:1433"
    volumes:
      - sql-data:/var/opt/mssql/data
      - sql-logs:/var/opt/mssql/log
    healthcheck:
      test: ["CMD-SHELL", "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'FlashDB@Password123' -Q 'SELECT 1'; else /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'FlashDB@Password123' -Q 'SELECT 1'; fi"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - flashdb-network

  # SQL Server initialization (official image does not auto-run mounted scripts)
  sql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flashdb-sql-init
    depends_on:
      sql-server:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - ./docker/init-testdb.sql:/init-testdb.sql:ro
    command: >
      bash -c "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
        /opt/mssql-tools18/bin/sqlcmd -b -C -S sql-server -U sa -P 'FlashDB@Password123' -i /init-testdb.sql;
      else
        /opt/mssql-tools/bin/sqlcmd -b -S sql-server -U sa -P 'FlashDB@Password123' -i /init-testdb.sql;
      fi"
    networks:
      - flashdb-network

  # FlashDB REST API (Node.js)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: flashdb-api
    depends_on:
      sql-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: "development"
      PORT: "3001"
      LOG_LEVEL: "info"
      POWERSHELL_COMMAND: "pwsh"
      FLASHDB_MODULE_PATH: "/app/src/FlashDB/FlashDB.psm1"
      SQL_SERVER_HOST: "sql-server"
      SQL_SERVER_PORT: "1433"
      SQL_SERVER_USER: "sa"
      SQL_SERVER_PASSWORD: "FlashDB@Password123"
      FLASHDB_STATE_PATH: "/app/logs/flashdb-state.json"
    ports:
      - "3001:3001"
    volumes:
      - api-logs:/app/logs
    networks:
      - flashdb-network

  # FlashDB React GUI
  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: flashdb-gui
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://api:3001"
    networks:
      - flashdb-network

  # Test Runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: flashdb-test-runner
    depends_on:
      sql-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    environment:
      SQL_SERVER_HOST: "sql-server"
      SQL_SERVER_PORT: "1433"
      SQL_SERVER_USER: "sa"
      SQL_SERVER_PASSWORD: "FlashDB@Password123"
      FLASHDB_HOME: "/app/flashdb"
      API_URL: "http://api:3001"
    volumes:
      - .:/app/flashdb
      - test-results:/app/test-results
    networks:
      - flashdb-network

volumes:
  sql-data:
  sql-logs:
  api-logs:
  test-results:

networks:
  flashdb-network:
    driver: bridge
