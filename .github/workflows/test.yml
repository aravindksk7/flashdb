name: FlashDB Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  powershell-tests:
    name: PowerShell Module Tests
    runs-on: windows-latest
    strategy:
      matrix:
        powershell-version: ['5.1', '7.0', '7.2', '7.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: ${{ matrix.powershell-version }}

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck

      - name: Run FlashDB Module Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/FlashDB'
          $config.Run.Exit = $true
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = 'src/FlashDB'
          Invoke-Pester -Configuration $config

      - name: Run SQL Server Provider Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/Providers/SqlServer'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Run Integration Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/Integration'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Run Performance Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/Performance'
          $config.Run.Exit = $false
          Invoke-Pester -Configuration $config

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pester-results-${{ matrix.powershell-version }}
          path: tests/**/TestResults.xml

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: tests/**/TestResults.xml
          check_name: Test Results (${{ matrix.powershell-version }})

  api-tests:
    name: REST API Tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Build API Project
        run: dotnet build src/FlashDB.Api/FlashDB.Api.csproj

      - name: Run API Tests
        run: dotnet test tests/FlashDB.Api/FlashDB.Api.Tests.csproj --logger "trx;LogFileName=api-test-results.trx"

      - name: Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: api-test-results
          path: tests/FlashDB.Api/api-test-results.trx

      - name: Publish API Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: tests/FlashDB.Api/api-test-results.trx
          check_name: API Test Results

  code-quality:
    name: Code Quality & Coverage
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.4'

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Run Code Analysis
        shell: pwsh
        run: |
          $Results = Invoke-ScriptAnalyzer -Path 'src/FlashDB' -Recurse -Severity Warning
          if ($Results) {
            Write-Error "PSScriptAnalyzer found issues:"
            $Results | Format-Table
            exit 1
          }

      - name: Run Tests with Coverage
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/FlashDB'
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = 'src/FlashDB'
          $config.CodeCoverage.OutputPath = 'coverage.xml'
          Invoke-Pester -Configuration $config

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: powershell
          name: flashdb-coverage

  security-scan:
    name: Security Scanning
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2

      - name: Install Security Modules
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          Install-Module -Name PowerShellBDD -Force -SkipPublisherCheck

      - name: Scan for Secrets
        shell: pwsh
        run: |
          $Files = Get-ChildItem -Path 'src', 'tests' -Include '*.ps1', '*.cs' -Recurse
          $Secrets = @('password', 'secret', 'apikey', 'token', 'credential')
          $Found = $false

          foreach ($File in $Files) {
            $Content = Get-Content $File.FullName
            foreach ($Secret in $Secrets) {
              if ($Content -match "($Secret)\s*=\s*['\"]") {
                Write-Error "Potential secret found in $($File.Name): $Secret"
                $Found = $true
              }
            }
          }

          if ($Found) { exit 1 }

      - name: Run PSScriptAnalyzer Security Rules
        shell: pwsh
        run: |
          $Rules = @(
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSUseSecureMethodsForPasswordHandling'
          )

          $Results = Invoke-ScriptAnalyzer -Path 'src/FlashDB' -IncludeRule $Rules -Recurse
          if ($Results) {
            Write-Error "Security issues found:"
            $Results | Format-Table
            exit 1
          }

  performance-baseline:
    name: Performance Baseline
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.4'

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck

      - name: Run Performance Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/Performance'
          $config.Run.Exit = $false
          Invoke-Pester -Configuration $config

      - name: Upload Performance Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: tests/Performance/performance-report.json

      - name: Comment Performance Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('tests/Performance/performance-report.json', 'utf8'));

            let comment = '## Performance Test Results\n\n';
            comment += `**Generated**: ${report.GeneratedAt}\n`;
            comment += `**Passed**: ${report.PassedTests} / ${report.TotalTests}\n\n`;

            comment += '| Operation | Duration | Target | Status |\n';
            comment += '|-----------|----------|--------|--------|\n';

            report.Operations.forEach(op => {
              const duration = op.Duration ? op.Duration.toFixed(3) + 's' : 'N/A';
              const target = op.Target ? op.Target.toFixed(3) + 's' : 'N/A';
              const status = op.Status === 'PASS' ? '✅' : '❌';
              comment += `| ${op.Operation} | ${duration} | ${target} | ${status} |\n`;
            });

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  load-tests:
    name: Load Testing
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.4'

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck

      - name: Run Load Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/Performance/LoadTests.ps1'
          $config.Run.Exit = $false
          Invoke-Pester -Configuration $config

      - name: Upload Load Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results
          path: tests/Performance/load-test-report.json

  resilience-tests:
    name: Resilience Testing
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.4'

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck

      - name: Run Resilience Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/Resilience'
          $config.Run.Exit = $false
          Invoke-Pester -Configuration $config

      - name: Upload Resilience Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: resilience-test-results
          path: tests/Resilience/resilience-test-report.json

  build-package:
    name: Build PowerShell Module Package
    runs-on: windows-latest
    needs: [powershell-tests, api-tests, code-quality]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.4'

      - name: Build Module
        shell: pwsh
        run: |
          # Copy source files to output directory
          $OutputPath = 'publish/FlashDB'
          New-Item -ItemType Directory -Path $OutputPath -Force | Out-Null

          Copy-Item 'src/FlashDB/*' -Destination $OutputPath -Recurse

      - name: Package Module
        shell: pwsh
        run: |
          $Version = [version]'0.1.0'
          $ModuleManifest = "publish/FlashDB/FlashDB.psd1"

          # Update version in manifest
          $Content = Get-Content $ModuleManifest -Raw
          $Content = $Content -replace "ModuleVersion = '[^']*'", "ModuleVersion = '$Version'"
          Set-Content $ModuleManifest $Content

      - name: Upload Module Package
        uses: actions/upload-artifact@v3
        with:
          name: flashdb-module
          path: publish/FlashDB
          retention-days: 30

  summary:
    name: Test Summary
    runs-on: windows-latest
    needs: [powershell-tests, api-tests, code-quality, security-scan, performance-baseline, load-tests, resilience-tests]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          Write-Output "## FlashDB Test Summary (v1.0.0 Production Release)"
          Write-Output ""
          Write-Output "| Component | Status |"
          Write-Output "|-----------|--------|"
          Write-Output "| PowerShell Tests | ${{ needs.powershell-tests.result }} |"
          Write-Output "| API Tests | ${{ needs.api-tests.result }} |"
          Write-Output "| Code Quality | ${{ needs.code-quality.result }} |"
          Write-Output "| Security Scan | ${{ needs.security-scan.result }} |"
          Write-Output "| Performance Baseline | ${{ needs.performance-baseline.result }} |"
          Write-Output "| Load Testing | ${{ needs.load-tests.result }} |"
          Write-Output "| Resilience Testing | ${{ needs.resilience-tests.result }} |"
          Write-Output ""
          Write-Output "**Test Coverage:**"
          Write-Output "- 300+ unit & integration tests"
          Write-Output "- 100+ load tests (5, 10, 20 concurrent users)"
          Write-Output "- 100+ security tests (OWASP Top 10)"
          Write-Output "- 50+ resilience tests (failure scenarios)"
          Write-Output "- 85%+ code coverage target"

      - name: Check Overall Status
        run: |
          $Results = @(
            "${{ needs.powershell-tests.result }}",
            "${{ needs.api-tests.result }}",
            "${{ needs.code-quality.result }}",
            "${{ needs.security-scan.result }}",
            "${{ needs.load-tests.result }}",
            "${{ needs.resilience-tests.result }}"
          )

          if ($Results -contains "failure") {
            Write-Error "Some test suites failed"
            exit 1
          }

          Write-Output "All test suites passed successfully!"
