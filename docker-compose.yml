services:
  # SQL Server with test database
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flashdb-sql-server
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "FlashDB@Password123"
      MSSQL_PID: "Developer"
    ports:
      - "${SQL_SERVER_HOST_PORT:-1434}:1433"
    volumes:
      - sql-data:/var/opt/mssql/data
      - sql-logs:/var/opt/mssql/log
    healthcheck:
      test: ["CMD-SHELL", "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'FlashDB@Password123' -Q 'SELECT 1'; else /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'FlashDB@Password123' -Q 'SELECT 1'; fi"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - flashdb-network

  # SQL Server initialization (official image does not auto-run mounted scripts)
  sql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flashdb-sql-init
    depends_on:
      sql-server:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - ./docker/init-testdb.sql:/init-testdb.sql:ro
      - ./src/api/src/db/schema.sql:/api-schema.sql:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        set -x

        echo "Starting SQL Server initialization..."

        # Find sqlcmd
        if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
          SQLCMD="/opt/mssql-tools18/bin/sqlcmd"
          echo "Using sqlcmd from mssql-tools18"
        elif [ -x /opt/mssql-tools/bin/sqlcmd ]; then
          SQLCMD="/opt/mssql-tools/bin/sqlcmd"
          echo "Using sqlcmd from mssql-tools"
        else
          echo "ERROR: sqlcmd not found in SQL Server image" >&2
          exit 1
        fi

        # Wait for SQL Server to be ready (with timeout)
        echo "Waiting for SQL Server to be ready on sql-server:1433..."
        for i in {1..60}; do
          if "$SQLCMD" -b -C -S sql-server -U sa -P 'FlashDB@Password123' -Q "SELECT 1" >/dev/null 2>&1; then
            echo "SQL Server is ready!"
            break
          fi
          echo "Attempt $i: Waiting for SQL Server..."
          sleep 1
          if [ $i -eq 60 ]; then
            echo "ERROR: SQL Server did not become ready within 60 seconds" >&2
            exit 1
          fi
        done

        # Check if TestDB already exists
        echo "Checking if TestDB already exists..."
        DB_EXISTS=$("$SQLCMD" -b -C -S sql-server -U sa -P 'FlashDB@Password123' -h -1 -W -Q "SET NOCOUNT ON; SELECT CASE WHEN DB_ID(N'TestDB') IS NULL THEN 0 ELSE 1 END;" | tr -d '[:space:]')

        if [ "$DB_EXISTS" = "1" ]; then
          echo "TestDB already exists; skipping SQL init scripts."
          exit 0
        fi

        echo "TestDB does not exist; initializing..."

        # Run init script
        echo "Running init-testdb.sql..."
        "$SQLCMD" -b -C -S sql-server -U sa -P 'FlashDB@Password123' -i /init-testdb.sql

        if [ $? -ne 0 ]; then
          echo "ERROR: init-testdb.sql failed" >&2
          exit 1
        fi

        # Run schema script
        echo "Running api-schema.sql..."
        "$SQLCMD" -b -C -S sql-server -U sa -P 'FlashDB@Password123' -d TestDB -i /api-schema.sql

        if [ $? -ne 0 ]; then
          echo "ERROR: api-schema.sql failed" >&2
          exit 1
        fi

        echo "SQL Server initialization completed successfully!"
        exit 0
    networks:
      - flashdb-network

  # FlashDB REST API (Node.js)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: flashdb-api
    depends_on:
      sql-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: "development"
      PORT: "3001"
      LOG_LEVEL: "info"
      POWERSHELL_COMMAND: "pwsh"
      FLASHDB_MODULE_PATH: "/app/src/FlashDB/FlashDB.psm1"
      SQL_SERVER_HOST: "sql-server"
      SQL_SERVER_PORT: "1433"
      SQL_SERVER_USER: "sa"
      SQL_SERVER_PASSWORD: "FlashDB@Password123"
      SQL_DATABASE: "TestDB"
      FLASHDB_STATE_PATH: "/app/logs/flashdb-state.json"
    ports:
      - "3001:3001"
    volumes:
      - api-logs:/app/logs
      - api-data:/app/data
    networks:
      - flashdb-network

  # FlashDB React GUI
  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: flashdb-gui
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://api:3001"
    networks:
      - flashdb-network

volumes:
  sql-data:
  sql-logs:
  api-logs:
  api-data:

networks:
  flashdb-network:
    driver: bridge
