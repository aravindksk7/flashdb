version: '3.8'

services:
  # SQL Server Database
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flashdb-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "FlashDB@Password123"
      MSSQL_PID: "Developer"
      MSSQL_DATA_DIR: /var/opt/mssql/data
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql/data
      - ./docker/init-testdb.sql:/init-testdb.sql
    networks:
      - flashdb-network
    healthcheck:
      test: ["CMD", "bash", "-c", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P FlashDB@Password123 -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  # GUI Dashboard - connects to API on host machine
  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: flashdb-gui
    depends_on:
      sql-server:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Connect to API running locally on Windows
      VITE_API_URL: http://host.docker.internal:3001
    networks:
      - flashdb-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  sql-data:

networks:
  flashdb-network:
    driver: bridge
