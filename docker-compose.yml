version: '3.8'

services:
  # SQL Server Database
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flashdb-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "FlashDB@Password123"
      MSSQL_PID: "Developer"
      MSSQL_DATA_DIR: /var/opt/mssql/data
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql/data
      - ./docker/init-testdb.sql:/init-testdb.sql
    networks:
      - flashdb-network
    healthcheck:
      test: ["CMD", "bash", "-c", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P FlashDB@Password123 -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  # REST API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: flashdb-api
    depends_on:
      sql-server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      FLASHDB_MODULE_PATH: /app/flashdb/src/FlashDB/FlashDB.psm1
    ports:
      - "3001:3001"
    volumes:
      - .:/app/flashdb
      - api-logs:/app/logs
    networks:
      - flashdb-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # GUI Dashboard
  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: flashdb-gui
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://api:3001
    networks:
      - flashdb-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  sql-data:
  api-logs:

networks:
  flashdb-network:
    driver: bridge
